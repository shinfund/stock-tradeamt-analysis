<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>주식 분석 도구</title>
<link rel="preload" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"></noscript>
<style>
:root{
  --sky:#378ADD;--sky50:#E6F1FB;--sky100:#B5D4F4;--sky600:#185FA5;--sky800:#0C447C;
  --teal:#1D9E75;--teal50:#E1F5EE;--teal600:#147a5a;
  --purple:#534AB7;--purple50:#EEEDFE;
  --bg:#F5F8FF;--card:#FFFFFF;--border:#E0EAF5;
  --txt:#1A2535;--txt2:#3D4F68;--txt3:#6B7E99;
  --r12:12px;--r16:16px;--r20:20px;
  --shadow:0 2px 12px rgba(55,138,221,.08);
  --shadow-hover:0 6px 24px rgba(55,138,221,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;font-size:15px;line-height:1.6;word-break:keep-all;color:var(--txt);background:var(--bg);-webkit-font-smoothing:antialiased;}
.hdr-wrap{position:fixed;top:0;left:0;right:0;z-index:50;box-shadow:0 2px 12px rgba(12,68,124,.18);}
.header{background:var(--sky800);padding:max(14px,env(safe-area-inset-top)) 20px 14px;display:flex;align-items:center;gap:12px;max-width:1100px;margin:0 auto;}
.logo-mark{width:40px;height:40px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-title{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.02em;}
.logo-sub{font-size:12px;color:rgba(255,255,255,.75);margin-top:1px;}
.wrap{max-width:1100px;margin:0 auto;min-height:100dvh;}
.main{padding:24px 20px 40px;}
.section-title{font-size:13px;font-weight:700;color:var(--txt3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:12px;padding-left:2px;}
.app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:40px;}
.app-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r16);padding:22px;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:14px;box-shadow:var(--shadow);transition:box-shadow .2s,border-color .2s,transform .15s;cursor:pointer;}
.app-card:hover{box-shadow:var(--shadow-hover);border-color:var(--sky100);transform:translateY(-2px);}
.app-card-top{display:flex;align-items:flex-start;gap:14px;}
.app-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.app-icon.sky{background:var(--sky50);}
.app-icon.teal{background:var(--teal50);}
.app-meta{flex:1;min-width:0;}
.app-name{font-size:16px;font-weight:800;color:var(--txt);letter-spacing:-.01em;margin-bottom:3px;}
.app-file{font-size:11.5px;color:var(--txt3);font-weight:500;}
.app-desc{font-size:13.5px;color:var(--txt2);line-height:1.65;}
.app-tags{display:flex;gap:6px;flex-wrap:wrap;}
.tag{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.tag-sky{background:var(--sky50);color:var(--sky600);}
.tag-teal{background:var(--teal50);color:var(--teal600);}
.footer{text-align:center;font-size:12px;color:var(--txt3);padding:24px 0;border-top:1px solid var(--border);}
@media(max-width:600px){
  .main{padding:16px 14px 32px;}
  .app-grid{grid-template-columns:1fr;gap:12px;}
  .app-card{padding:18px;}
  .logo-title{font-size:16px;}
  .logo-sub{display:none;}
}
@media(min-width:769px){
  .main{padding:32px 24px 48px;}
  .app-grid{gap:20px;}
}
@media(min-width:1100px){
  .main{padding:32px 0 48px;}
}
</style>
</head>
<body>
<div class="hdr-wrap">
  <div class="header">
    <div class="logo-mark">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </div>
    <div>
      <div class="logo-title">주식 분석 도구</div>
      <div class="logo-sub">Notion 연동 실시간 분석 대시보드</div>
    </div>
  </div>
</div>
<div class="wrap">
  <div class="main" style="padding-top:calc(max(14px,env(safe-area-inset-top)) + 14px + 52px + 16px)">
    <div class="section-title">앱 목록</div>
    <div class="app-grid">
      <a class="app-card" href="stock-volume-rank.html">
        <div class="app-card-top">
          <div class="app-icon sky">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--sky600)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="14" width="4" height="8" rx="1"/><rect x="9" y="9" width="4" height="13" rx="1"/><rect x="16" y="4" width="4" height="18" rx="1"/></svg>
          </div>
          <div class="app-meta">
            <div class="app-name">주식거래대금순위</div>
            <div class="app-file">stock-volume-rank.html</div>
          </div>
        </div>
        <div class="app-desc">거래대금 상위 종목의 일별 순위·변동·진입·분포를 분석합니다. Notion 거래대금DB와 실시간 연동됩니다.</div>
        <div class="app-tags">
          <span class="tag tag-sky">일별 상위</span>
          <span class="tag tag-sky">순위 변동</span>
          <span class="tag tag-sky">상위 진입</span>
          <span class="tag tag-sky">순위 분포</span>
          <span class="tag tag-sky">종목 이력</span>
        </div>
      </a>
      <a class="app-card" href="stock-issue.html">
        <div class="app-card-top">
          <div class="app-icon teal">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--teal600)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <div class="app-meta">
            <div class="app-name">주식 이슈</div>
            <div class="app-file">stock-issue.html</div>
          </div>
        </div>
        <div class="app-desc">종목별 이슈를 강도·섹터·트리거 기준으로 분석합니다. Notion 이슈DB와 실시간 연동됩니다.</div>
        <div class="app-tags">
          <span class="tag tag-teal">빈도 순위</span>
          <span class="tag tag-teal">날짜별</span>
          <span class="tag tag-teal">섹터 분석</span>
          <span class="tag tag-teal">종목 검색</span>
        </div>
      </a>
    </div>
    <div class="footer">Notion 연동 · Cloudflare Worker 프록시</div>
  </div>
</div>
</body>
</html>
